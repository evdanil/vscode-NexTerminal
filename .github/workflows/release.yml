name: Release VSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_marketplace:
        description: "Publish to VS Code Marketplace"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  build-local-pty:
    name: Build Local PTY (${{ matrix.key }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            key: linux-x64
            binary: nexus-local-pty
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            key: linux-arm64
            binary: nexus-local-pty
          - os: macos-15-intel
            target: x86_64-apple-darwin
            key: darwin-x64
            binary: nexus-local-pty
          - os: macos-15
            target: aarch64-apple-darwin
            key: darwin-arm64
            binary: nexus-local-pty
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            key: win32-x64
            binary: nexus-local-pty.exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            key: win32-arm64
            binary: nexus-local-pty.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/local-pty

      - name: Build sidecar
        run: cargo build --manifest-path native/local-pty/Cargo.toml --release --target "${{ matrix.target }}"

      - name: Smoke test sidecar
        run: node scripts/smokeLocalPty.mjs "native/local-pty/target/${{ matrix.target }}/release/${{ matrix.binary }}"

      - name: Prepare artifact
        run: node scripts/collectLocalPtyArtifact.mjs "${{ matrix.target }}" "${{ matrix.key }}"

      - uses: actions/upload-artifact@v4
        with:
          name: local-pty-${{ matrix.key }}
          path: local-pty-dist

  build:
    needs: build-local-pty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: local-pty-*
          path: native/local-pty-artifacts
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          LOCAL_PTY_REQUIRE_ALL: "1"
        run: npm run build:production

      - name: Run tests
        run: npm test

      - name: Remove CI-compiled native addons (keep cross-platform prebuilds)
        run: rm -rf node_modules/@serialport/bindings-cpp/build

      - name: Package VSIX
        run: npx @vscode/vsce package 
      - name: Verify VSIX contents
        run: |
          VSIX_FILE=$(ls *.vsix)
          echo "VSIX: $VSIX_FILE ($(du -h "$VSIX_FILE" | cut -f1))"
          unzip -l "$VSIX_FILE" | grep -c "serialport" || { echo "ERROR: serialport not found in VSIX"; exit 1; }
          unzip -l "$VSIX_FILE" | grep "prebuilds.*\.node" || { echo "ERROR: native prebuilds not found in VSIX"; exit 1; }
          for platform in win32-x64 win32-arm64 linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            binary="nexus-local-pty"
            if [[ "$platform" == win32-* ]]; then
              binary="nexus-local-pty.exe"
            fi
            unzip -l "$VSIX_FILE" | grep "extension/dist/native/local-pty/$platform/$binary" || {
              echo "ERROR: Local Shell PTY sidecar missing from VSIX: $platform/$binary"
              exit 1
            }
          done
          echo "VSIX verification passed"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: >-
          startsWith(github.ref, 'refs/tags/v')
          || inputs.publish_marketplace
        run: npx @vscode/vsce publish --packagePath *.vsix --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}


      - name: Prune old npm caches
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Pruning stale npm caches..."
          gh cache list --key node-cache- --json id,createdAt --order desc \
            | jq -r '.[1:][].id' \
            | while read -r id; do
                echo "Deleting cache $id"
                gh cache delete "$id"
              done
          echo "Remaining caches:"
          gh cache list
