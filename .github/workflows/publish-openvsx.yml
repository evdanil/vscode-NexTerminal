# Publishes this extension to Open VSX from version tags.
# Required secret: OVSX_PAT (Open VSX personal access token with publish rights).
# Expected tag format: vX.Y.Z (example: v2.8.32).
name: Publish Open VSX

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-and-publish-openvsx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build:production

      - name: Remove CI-compiled native addons (keep cross-platform prebuilds)
        run: rm -rf node_modules/@serialport/bindings-cpp/build

      - name: Package VSIX for Open VSX
        run: npm run package:ovsx

      - name: Publish to Open VSX Registry
        run: npm run publish:ovsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
